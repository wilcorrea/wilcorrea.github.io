<!DOCTYPE html>
<html>

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <script type="text/javascript" src="//unpkg.com/vue"></script>
    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <link rel="stylesheet" href="//maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css">

    <script type="text/javascript" src="helper.js"></script>
    <script type="text/javascript" src="settings.js"></script>
    <script type="text/javascript" src="app.js"></script>

    <meta name="description" content="William Correa">
    <meta name="keywords" content="blog,developer,php,java,delphi,vuejs,react,javascript,shell">
    <title>@wilcorrea</title>

    <meta name="theme-color" content="#ffffff">
    <style type="text/css">
      #body {
        position: absolute;
        height: 100%;
        width: 100%;
        background-color: #24292E;
        padding: 20px;
        font-family: Helvetica;
      }

      #app {
        background: #fff;
        border-radius: 4px;
        padding: 5px 20px 20px 20px;
        max-width: 670px;
        margin: 0 auto;
      }

      header {
        padding: 0 20px 20px 20px;
        text-align: center;
      }

      #avatar {
        height: 200px;
        width: 200px;
        background-position: center;
        background-size: contains;
        background-repeat: no-repeat;
        border-radius: 120px;
      }

      a, .social, .languages {
        color: #526d7a;
      }
      
      a:hover {
        text-decoration: none;
      }
      
      .social a, .languages a {
        margin: 0 10px;
      }

      .social,
      .social a {
        font-size: 1.5em;
      }

      .social, .languages {
        margin-top: 25px;
        margin-bottom: 20px;
      }

      .languages {
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div id="body">
      <div id="app">
        <div v-if="locale" class="row">
          <header class="col-sm-12">
            <h3>{{ lang('header') }}</h3>
          </header>
          <div class="col-sm-4">
            <div id="avatar":style="avatar"></div>
          </div>
          <div class="col-sm-8 text-justify">
            {{ lang('bio') }}
          </div>
        </div>
        <section v-if="locale" class="social text-center">
          <a v-for="(link, key) in social" :key="key" :href="link.href">
            <i :class="link.class" aria-hidden="true"></i>
          </a>
        </section>
        <section class="languages">
          <template v-for="(language, key) in i18n">
            <small>
              <i class="fa fa-language"></i>
              &nbsp;
              <a :key="key" href="javascript:void(0)" @click="browse(key)">{{ key }}</a>
            </small>
          </template>
        </section>
        <footer>
          <small><i> &lt;app&gt;&lt;life/&gt;&lt;/app&gt; </i></small>
          &nbsp; | &nbsp;
          <a href="https://github.com/wilcorrea/wilcorrea.github.io" target="_blank">
            <i class="fa fa-clone" aria-hidden="true"></i> Copiar
          </a>
        </footer>
      </div>
    </div>

    <script type="text/javascript">
      App.run('#app')
    </script>
  </body>

</html>
